<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protein Elite - E-commerce</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- NAVBAR -->
  <header class="bg-white shadow-md fixed w-full z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <h1 class="text-2xl font-bold text-yellow-500">ProteinElite</h1>
      <button id="cartBtn" class="bg-black text-white px-4 py-2 rounded">🛒 Panier (<span id="cartCount">0</span>)</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="h-screen bg-gradient-to-r from-black to-gray-800 text-white flex flex-col justify-center items-center text-center px-4">
    <h2 class="text-5xl font-bold mb-4">Boutique de Protéines</h2>
    <p class="mb-6">Achetez facilement vos compléments alimentaires</p>
  </section>

  <!-- PRODUITS -->
  <section class="py-20 max-w-6xl mx-auto px-6" id="products">
    <h3 class="text-3xl font-bold text-center mb-12">Nos Produits</h3>
    <div class="grid md:grid-cols-3 gap-10" id="productList"></div>
  </section>

  <!-- PANIER -->
  <div id="cart" class="fixed right-0 top-0 w-80 h-full bg-white shadow-lg p-5 hidden flex-col">
    <h3 class="text-xl font-bold mb-4">Panier</h3>
    <div id="cartItems" class="flex-1"></div>
    <p class="font-bold mt-4">Total: <span id="total">0</span> FCFA</p>
    <button id="checkout" class="bg-yellow-500 w-full py-2 mt-4 rounded">Commander</button>
  </div>
